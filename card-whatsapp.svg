<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 215">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#075E54"/>
      <stop offset="100%" stop-color="#25D366"/>
    </linearGradient>
    <filter id="halo" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="210" height="215" fill="#0d1117" rx="14"/>

  <!-- Floating group -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,-9;0,0" dur="3.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" begin="-2.625s"/>

    <!-- Glow halo -->
    <rect x="5" y="10" width="200" height="190" rx="18" fill="#25D366" filter="url(#halo)">
      <animate attributeName="opacity" values="0.2;0.65;0.2" dur="3.5s" repeatCount="indefinite" begin="-2.625s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </rect>

    <!-- Animated border -->
    <rect x="5" y="10" width="200" height="190" rx="18" fill="none" stroke="#34C85A" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite" begin="-2.625s"/>
      <animate attributeName="stroke-width"   values="1.5;2.8;1.5" dur="3.5s" repeatCount="indefinite" begin="-2.625s"/>
    </rect>

    <!-- Card body -->
    <rect x="7" y="12" width="196" height="186" rx="16" fill="url(#g)" filter="url(#sh)"/>
    <!-- Shine top -->
    <rect x="7" y="12" width="196" height="54" rx="16" fill="white" opacity="0.1"/>
    <rect x="7" y="60" width="196" height="10"         fill="white" opacity="0.05"/>

    <!-- WhatsApp chat bubble icon -->
    <circle cx="105" cy="78" r="28" fill="rgba(0,0,0,0.28)"/>
    <!-- Main bubble body -->
    <rect x="91" y="63" width="30" height="22" rx="7" fill="white"/>
    <!-- Bubble tail (bottom-left) -->
    <path d="M 93,85 L 87,94 L 98,87" fill="white"/>
    <!-- Three dots inside bubble -->
    <circle cx="100" cy="74" r="2.2" fill="#25D366"/>
    <circle cx="106" cy="74" r="2.2" fill="#25D366"/>
    <circle cx="112" cy="74" r="2.2" fill="#25D366"/>

    <!-- Platform name -->
    <text x="105" y="124" text-anchor="middle"
          fill="white" font-family="'Segoe UI',Arial,sans-serif"
          font-size="15" font-weight="700">WhatsApp</text>

    <!-- Handle pill -->
    <rect x="30" y="132" width="150" height="20" rx="10" fill="rgba(0,0,0,0.28)"/>
    <text x="105" y="146" text-anchor="middle"
          fill="rgba(255,255,255,0.92)" font-family="'Segoe UI',Arial,sans-serif"
          font-size="9">+91 95559 54884</text>

    <!-- Tagline -->
    <text x="105" y="170" text-anchor="middle"
          fill="rgba(255,255,255,0.6)" font-family="'Segoe UI',Arial,sans-serif"
          font-size="9" font-style="italic">Chat with me directly ↗</text>

    <!-- Accent line -->
    <line x1="72" y1="185" x2="138" y2="185" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
