<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
<defs>
  <!-- Backgrounds -->
  <radialGradient id="bg-g" cx="50%" cy="40%" r="70%">
    <stop offset="0%"  stop-color="#161b2e"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </radialGradient>
  <radialGradient id="cg" cx="50%" cy="50%" r="55%">
    <stop offset="0%"   stop-color="#7aa2f7" stop-opacity="0.1"/>
    <stop offset="55%"  stop-color="#bb9af7" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
  </radialGradient>

  <!-- Title gradient (covers text span) -->
  <linearGradient id="tg" x1="180" y1="0" x2="620" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#7aa2f7"/>
    <stop offset="42%"  stop-color="#c0caf5"/>
    <stop offset="100%" stop-color="#bb9af7"/>
  </linearGradient>

  <!-- Scan line gradient (left-right fade) -->
  <linearGradient id="slg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#7aa2f7" stop-opacity="0"/>
    <stop offset="20%"  stop-color="#7aa2f7" stop-opacity="0.5"/>
    <stop offset="50%"  stop-color="#c0caf5" stop-opacity="0.8"/>
    <stop offset="80%"  stop-color="#7aa2f7" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
  </linearGradient>

  <!-- Grid pattern 50×50 -->
  <pattern id="gp" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#7aa2f7" stroke-width="0.25" opacity="0.45"/>
  </pattern>
  <!-- Grid mask (fade edges) -->
  <radialGradient id="gm-g" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="white" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </radialGradient>
  <mask id="gm"><rect width="800" height="280" fill="url(#gm-g)"/></mask>

  <!-- Neon double-glow filter for title -->
  <filter id="neon" x="-22%" y="-120%" width="144%" height="340%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="b1"/>
    <feFlood flood-color="#7aa2f7" flood-opacity="0.3" result="c1"/>
    <feComposite in="c1" in2="b1" operator="in" result="g1"/>
    <feGaussianBlur in="SourceAlpha" stdDeviation="6"  result="b2"/>
    <feFlood flood-color="#c0caf5" flood-opacity="0.7" result="c2"/>
    <feComposite in="c2" in2="b2" operator="in" result="g2"/>
    <feMerge>
      <feMergeNode in="g1"/>
      <feMergeNode in="g2"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Particle blur glow -->
  <filter id="pb" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="2.8"/>
  </filter>

  <!-- Data-stream motion paths -->
  <path id="st1" d="M -12,30   L 812,30"/>
  <path id="st2" d="M 812,246  L -12,246"/>
  <path id="st3" d="M -12,260  L 812,260"/>
</defs>

<!-- ════════ BACKGROUND ════════ -->
<rect width="800" height="280" fill="url(#bg-g)"/>
<rect width="800" height="280" fill="url(#gp)" mask="url(#gm)"/>

<!-- ════════ CENTER AMBIENT GLOW ════════ -->
<ellipse cx="400" cy="132" rx="300" ry="96" fill="url(#cg)">
  <animate attributeName="rx"      values="280;325;280" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  <animate attributeName="opacity" values="0.7;1;0.7"   dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
</ellipse>

<!-- ════════ PARTICLES ════════ -->
<!-- Blue -->
<circle cx="0" cy="0" r="2" fill="#7aa2f7" filter="url(#pb)"><animate attributeName="cx" values="48;60;52;42;48"   dur="12s" repeatCount="indefinite"/><animate attributeName="cy" values="52;42;64;50;52"   dur="12s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;1;0.6;0.4" dur="12s" repeatCount="indefinite"/></circle>
<circle cx="0" cy="0" r="2.2" fill="#7aa2f7" filter="url(#pb)"><animate attributeName="cx" values="165;177;160;170;165" dur="8s"  repeatCount="indefinite"/><animate attributeName="cy" values="64;54;74;60;64"    dur="8s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.7;0.5" dur="8s"  repeatCount="indefinite" begin="-2s"/></circle>
<circle cx="0" cy="0" r="2.5" fill="#7aa2f7" filter="url(#pb)"><animate attributeName="cx" values="538;552;534;544;538" dur="12s" repeatCount="indefinite"/><animate attributeName="cy" values="55;45;66;50;55"    dur="12s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;1;0.7;0.4" dur="12s" repeatCount="indefinite" begin="-4s"/></circle>
<circle cx="0" cy="0" r="1.8" fill="#7aa2f7" filter="url(#pb)"><animate attributeName="cx" values="640;653;636;646;640" dur="9s"  repeatCount="indefinite"/><animate attributeName="cy" values="76;66;86;72;76"    dur="9s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.8;0.5;0.3" dur="9s"  repeatCount="indefinite" begin="-5s"/></circle>
<circle cx="0" cy="0" r="2.2" fill="#7aa2f7" filter="url(#pb)"><animate attributeName="cx" values="745;758;740;750;745" dur="8s"  repeatCount="indefinite"/><animate attributeName="cy" values="60;50;72;56;60"    dur="8s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.7;0.5" dur="8s"  repeatCount="indefinite" begin="-3s"/></circle>
<circle cx="0" cy="0" r="1.8" fill="#7aa2f7" filter="url(#pb)"><animate attributeName="cx" values="230;242;226;236;230" dur="9s"  repeatCount="indefinite"/><animate attributeName="cy" values="200;190;212;196;200" dur="9s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.8;0.5;0.3" dur="9s"  repeatCount="indefinite" begin="-4s"/></circle>
<!-- Purple -->
<circle cx="0" cy="0" r="1.8" fill="#bb9af7" filter="url(#pb)"><animate attributeName="cx" values="94;84;100;90;94"    dur="9s"  repeatCount="indefinite"/><animate attributeName="cy" values="136;126;146;132;136" dur="9s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.8;0.5;0.3" dur="9s"  repeatCount="indefinite" begin="-1s"/></circle>
<circle cx="0" cy="0" r="2.5" fill="#bb9af7" filter="url(#pb)"><animate attributeName="cx" values="250;263;246;256;250" dur="10s" repeatCount="indefinite"/><animate attributeName="cy" values="76;66;86;72;76"    dur="10s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;1;0.6;0.4" dur="10s" repeatCount="indefinite" begin="-1s"/></circle>
<circle cx="0" cy="0" r="1.8" fill="#bb9af7" filter="url(#pb)"><animate attributeName="cx" values="558;570;554;564;558" dur="10s" repeatCount="indefinite"/><animate attributeName="cy" values="216;206;226;212;216" dur="10s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.8;0.5;0.3" dur="10s" repeatCount="indefinite" begin="-1s"/></circle>
<circle cx="0" cy="0" r="1.5" fill="#bb9af7" filter="url(#pb)"><animate attributeName="cx" values="754;766;750;760;754" dur="13s" repeatCount="indefinite"/><animate attributeName="cy" values="186;176;196;182;186" dur="13s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.7;0.4;0.2" dur="13s" repeatCount="indefinite" begin="-6s"/></circle>
<!-- Green -->
<circle cx="0" cy="0" r="1.5" fill="#9ece6a" filter="url(#pb)"><animate attributeName="cx" values="58;70;54;64;58"    dur="11s" repeatCount="indefinite"/><animate attributeName="cy" values="220;210;230;216;220" dur="11s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.7;0.4;0.3" dur="11s" repeatCount="indefinite" begin="-3s"/></circle>
<circle cx="0" cy="0" r="2"   fill="#9ece6a" filter="url(#pb)"><animate attributeName="cx" values="360;373;356;366;360" dur="11s" repeatCount="indefinite"/><animate attributeName="cy" values="35;25;46;30;35"    dur="11s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.9;0.6;0.4" dur="11s" repeatCount="indefinite" begin="-2s"/></circle>
<circle cx="0" cy="0" r="2"   fill="#9ece6a" filter="url(#pb)"><animate attributeName="cx" values="660;673;656;666;660" dur="11s" repeatCount="indefinite"/><animate attributeName="cy" values="175;165;186;170;175" dur="11s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.9;0.6;0.4" dur="11s" repeatCount="indefinite" begin="-2s"/></circle>
<!-- White/dim -->
<circle cx="0" cy="0" r="1.5" fill="#c0caf5" filter="url(#pb)"><animate attributeName="cx" values="140;152;136;146;140" dur="13s" repeatCount="indefinite"/><animate attributeName="cy" values="205;195;215;200;205" dur="13s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.6;0.4;0.2" dur="13s" repeatCount="indefinite" begin="-5s"/></circle>
<circle cx="0" cy="0" r="1.5" fill="#c0caf5" filter="url(#pb)"><animate attributeName="cx" values="430;443;426;436;430" dur="8s"  repeatCount="indefinite"/><animate attributeName="cy" values="246;236;256;242;246" dur="8s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.7;0.4;0.3" dur="8s"  repeatCount="indefinite" begin="-3s"/></circle>

<!-- ════════ CONSTELLATION LINES ════════ -->
<line x1="48"  y1="52"  x2="94"  y2="136" stroke="#7aa2f7" stroke-width="0.5"><animate attributeName="opacity" values="0.08;0.38;0.08" dur="8s"  repeatCount="indefinite" begin="0s"/></line>
<line x1="94"  y1="136" x2="165" y2="64"  stroke="#bb9af7" stroke-width="0.5"><animate attributeName="opacity" values="0.08;0.35;0.08" dur="9s"  repeatCount="indefinite" begin="-2s"/></line>
<line x1="165" y1="64"  x2="250" y2="76"  stroke="#7aa2f7" stroke-width="0.5"><animate attributeName="opacity" values="0.12;0.42;0.12" dur="10s" repeatCount="indefinite" begin="-1s"/></line>
<line x1="250" y1="76"  x2="360" y2="35"  stroke="#bb9af7" stroke-width="0.5"><animate attributeName="opacity" values="0.08;0.38;0.08" dur="7s"  repeatCount="indefinite" begin="-3s"/></line>
<line x1="360" y1="35"  x2="538" y2="55"  stroke="#7aa2f7" stroke-width="0.5"><animate attributeName="opacity" values="0.12;0.4;0.12"  dur="11s" repeatCount="indefinite" begin="-4s"/></line>
<line x1="538" y1="55"  x2="640" y2="76"  stroke="#9ece6a" stroke-width="0.5"><animate attributeName="opacity" values="0.08;0.35;0.08" dur="9s"  repeatCount="indefinite" begin="-2s"/></line>
<line x1="640" y1="76"  x2="745" y2="60"  stroke="#7aa2f7" stroke-width="0.5"><animate attributeName="opacity" values="0.12;0.42;0.12" dur="8s"  repeatCount="indefinite" begin="-5s"/></line>
<line x1="230" y1="200" x2="140" y2="205" stroke="#bb9af7" stroke-width="0.5"><animate attributeName="opacity" values="0.08;0.3;0.08"  dur="10s" repeatCount="indefinite" begin="-2s"/></line>
<line x1="660" y1="175" x2="754" y2="186" stroke="#9ece6a" stroke-width="0.5"><animate attributeName="opacity" values="0.12;0.38;0.12" dur="7s"  repeatCount="indefinite" begin="-3s"/></line>
<line x1="558" y1="216" x2="430" y2="246" stroke="#7aa2f7" stroke-width="0.5"><animate attributeName="opacity" values="0.08;0.32;0.08" dur="9s"  repeatCount="indefinite" begin="-1s"/></line>

<!-- ════════ DATA STREAMS ════════ -->
<!-- Track lines -->
<line x1="0" y1="30"  x2="800" y2="30"  stroke="#7aa2f7" stroke-width="0.4" opacity="0.14"/>
<line x1="0" y1="246" x2="800" y2="246" stroke="#7aa2f7" stroke-width="0.4" opacity="0.1"/>
<line x1="0" y1="260" x2="800" y2="260" stroke="#9ece6a" stroke-width="0.3" opacity="0.09"/>

<!-- Stream 1 (top, L→R) — 3 dots at staggered phases -->
<circle r="2.2" fill="#7aa2f7" filter="url(#pb)"><animateMotion dur="5.5s" repeatCount="indefinite" begin="0s"><mpath href="#st1"/></animateMotion><animate attributeName="opacity" values="0;0.9;0.9;0" dur="5.5s" keyTimes="0;0.08;0.92;1" repeatCount="indefinite" begin="0s"/></circle>
<circle r="1.6" fill="#c0caf5" filter="url(#pb)"><animateMotion dur="5.5s" repeatCount="indefinite" begin="-1.8s"><mpath href="#st1"/></animateMotion><animate attributeName="opacity" values="0;0.7;0.7;0" dur="5.5s" keyTimes="0;0.08;0.92;1" repeatCount="indefinite" begin="-1.8s"/></circle>
<circle r="1.2" fill="#bb9af7" filter="url(#pb)"><animateMotion dur="5.5s" repeatCount="indefinite" begin="-3.6s"><mpath href="#st1"/></animateMotion><animate attributeName="opacity" values="0;0.6;0.6;0" dur="5.5s" keyTimes="0;0.08;0.92;1" repeatCount="indefinite" begin="-3.6s"/></circle>

<!-- Stream 2 (bottom, R→L) — 2 dots -->
<circle r="2"   fill="#bb9af7" filter="url(#pb)"><animateMotion dur="6.5s" repeatCount="indefinite" begin="-1s"><mpath href="#st2"/></animateMotion><animate attributeName="opacity" values="0;0.8;0.8;0" dur="6.5s" keyTimes="0;0.08;0.92;1" repeatCount="indefinite" begin="-1s"/></circle>
<circle r="1.5" fill="#7aa2f7" filter="url(#pb)"><animateMotion dur="6.5s" repeatCount="indefinite" begin="-3.25s"><mpath href="#st2"/></animateMotion><animate attributeName="opacity" values="0;0.7;0.7;0" dur="6.5s" keyTimes="0;0.08;0.92;1" repeatCount="indefinite" begin="-3.25s"/></circle>

<!-- Stream 3 (L→R, slow green) -->
<circle r="1.5" fill="#9ece6a" filter="url(#pb)"><animateMotion dur="8s" repeatCount="indefinite" begin="-0.5s"><mpath href="#st3"/></animateMotion><animate attributeName="opacity" values="0;0.7;0.7;0" dur="8s" keyTimes="0;0.1;0.9;1" repeatCount="indefinite" begin="-0.5s"/></circle>

<!-- ════════ SCAN LINE ════════ -->
<rect x="0" width="800" height="3" fill="url(#slg)" opacity="0.4">
  <animate attributeName="y" values="-3;283" dur="5s" repeatCount="indefinite" calcMode="linear"/>
</rect>

<!-- ════════ CORNER BRACKETS ════════ -->
<!-- Top-left -->
<path d="M 40,12 L 14,12 L 14,44" stroke="#7aa2f7" stroke-width="1.8" fill="none"><animate attributeName="opacity" values="0.35;0.95;0.35" dur="5s" repeatCount="indefinite" begin="0s"/></path>
<circle cx="14" cy="12" r="2.5" fill="#7aa2f7"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
<!-- Top-right -->
<path d="M 760,12 L 786,12 L 786,44" stroke="#7aa2f7" stroke-width="1.8" fill="none"><animate attributeName="opacity" values="0.35;0.95;0.35" dur="5s" repeatCount="indefinite" begin="-2.5s"/></path>
<circle cx="786" cy="12" r="2.5" fill="#7aa2f7"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" begin="-1.25s"/></circle>
<!-- Bottom-left -->
<path d="M 40,268 L 14,268 L 14,236" stroke="#7aa2f7" stroke-width="1.8" fill="none"><animate attributeName="opacity" values="0.35;0.95;0.35" dur="5s" repeatCount="indefinite" begin="-1.25s"/></path>
<circle cx="14" cy="268" r="2.5" fill="#7aa2f7"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" begin="-0.5s"/></circle>
<!-- Bottom-right -->
<path d="M 760,268 L 786,268 L 786,236" stroke="#7aa2f7" stroke-width="1.8" fill="none"><animate attributeName="opacity" values="0.35;0.95;0.35" dur="5s" repeatCount="indefinite" begin="-3.5s"/></path>
<circle cx="786" cy="268" r="2.5" fill="#7aa2f7"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" begin="-1.75s"/></circle>

<!-- ════════ STATUS INDICATOR (top-right) ════════ -->
<circle cx="764" cy="36" r="4" fill="#9ece6a">
  <animate attributeName="r"       values="3;5;3"     dur="2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="754" y="40" text-anchor="end" fill="#9ece6a"
      font-family="'Courier New',Courier,monospace"
      font-size="9" letter-spacing="1" opacity="0.7">OPEN TO WORK</text>

<!-- ════════ MAIN TITLE ════════ -->
<text x="400" y="150" text-anchor="middle"
      fill="url(#tg)"
      font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="68" font-weight="900" letter-spacing="-2"
      filter="url(#neon)">
  Sanchit Singh
  <animate attributeName="opacity" values="0.92;1;0.92" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
</text>

<!-- ════════ SUBTITLE ════════ -->
<text x="400" y="192" text-anchor="middle"
      fill="#7aa2f7"
      font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="13" font-weight="400" letter-spacing="4.5">
  MOBILE APP DEVELOPER  •  FLUTTER  •  ANDROID
  <animate attributeName="opacity" values="0.65;1;0.65" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" begin="-1s"/>
</text>

<!-- ════════ CODE TAG LINE ════════ -->
<text x="400" y="224" text-anchor="middle"
      fill="#9ece6a"
      font-family="'Courier New',Courier,monospace"
      font-size="11" letter-spacing="1.2">
  &lt; Building the Future, One App at a Time /&gt;
  <animate attributeName="opacity" values="0.3;0.6;0.3" dur="6s" repeatCount="indefinite" begin="-2s"/>
</text>

<!-- ════════ CORNER LABELS ════════ -->
<text x="24" y="266" fill="#7aa2f7" font-family="'Courier New',monospace" font-size="9" letter-spacing="0.5" opacity="0.28">v2025 • FLUTTER_DEV</text>
<text x="776" y="266" text-anchor="end" fill="#bb9af7" font-family="'Courier New',monospace" font-size="9" letter-spacing="0.5" opacity="0.28">dart:mobile ✓</text>

