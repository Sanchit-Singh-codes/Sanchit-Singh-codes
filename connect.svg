<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 235">
  <defs>
    <!-- Platform card gradients -->
    <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0063a5"/>
      <stop offset="100%" stop-color="#0e76a8"/>
    </linearGradient>
    <linearGradient id="gi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6228d7"/>
      <stop offset="45%"  stop-color="#e1306c"/>
      <stop offset="100%" stop-color="#f77737"/>
    </linearGradient>
    <linearGradient id="gm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#b52a1c"/>
      <stop offset="100%" stop-color="#e03226"/>
    </linearGradient>
    <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#13111c"/>
      <stop offset="100%" stop-color="#2d1a68"/>
    </linearGradient>

    <!-- Title shimmer gradient -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7aa2f7"/>
      <stop offset="40%"  stop-color="#c0caf5"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>

    <!-- Ambient blur for glow halos -->
    <filter id="halo" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <!-- Soft card shadow -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#7aa2f7" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="840" height="235" fill="#0d1117" rx="14"/>
  <rect width="840" height="235" fill="url(#dots)" rx="14"/>

  <!-- Ambient center glow -->
  <ellipse cx="420" cy="145" rx="300" ry="80" fill="#7aa2f7" opacity="0.03" filter="url(#halo)"/>

  <!-- ═══ HEADER TITLE ═══ -->
  <!-- Decorative lines -->
  <line x1="40" y1="22" x2="330" y2="22" stroke="url(#title-grad)" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="510" y1="22" x2="800" y2="22" stroke="url(#title-grad)" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Title -->
  <text x="420" y="27" text-anchor="middle"
        fill="url(#title-grad)"
        font-family="'Segoe UI', Arial, Helvetica, sans-serif"
        font-size="13" font-weight="700" letter-spacing="5">
    ✦  CONNECT WITH ME  ✦
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </text>

  <!-- ═══════════════════════════════════════════════
       FLOATING PARTICLES (ambient stars)
  ════════════════════════════════════════════════════ -->
  <circle cx="30"  cy="55"  r="1.5" fill="#7aa2f7"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.8s" repeatCount="indefinite" begin="0s"/></circle>
  <circle cx="80"  cy="200" r="1"   fill="#bb9af7"><animate attributeName="opacity" values="0.1;0.6;0.1"   dur="3.5s" repeatCount="indefinite" begin="-1s"/></circle>
  <circle cx="160" cy="40"  r="1.5" fill="#9ece6a"><animate attributeName="opacity" values="0.1;0.5;0.1"   dur="4s"   repeatCount="indefinite" begin="-2s"/></circle>
  <circle cx="390" cy="220" r="1"   fill="#7aa2f7"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.2s" repeatCount="indefinite" begin="-0.5s"/></circle>
  <circle cx="450" cy="45"  r="1.5" fill="#bb9af7"><animate attributeName="opacity" values="0.1;0.6;0.1"   dur="3.1s" repeatCount="indefinite" begin="-1.5s"/></circle>
  <circle cx="600" cy="215" r="1"   fill="#7aa2f7"><animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.6s" repeatCount="indefinite" begin="-2.2s"/></circle>
  <circle cx="680" cy="42"  r="1.5" fill="#9ece6a"><animate attributeName="opacity" values="0.1;0.55;0.1"  dur="3.8s" repeatCount="indefinite" begin="-0.8s"/></circle>
  <circle cx="810" cy="100" r="1"   fill="#bb9af7"><animate attributeName="opacity" values="0.1;0.7;0.1"   dur="2.4s" repeatCount="indefinite" begin="-1.8s"/></circle>
  <circle cx="820" cy="190" r="1.5" fill="#7aa2f7"><animate attributeName="opacity" values="0.15;0.6;0.15" dur="3.3s" repeatCount="indefinite" begin="-0.3s"/></circle>

  <!-- ══════════════════════════════════════════════════════
       CARD 1 — LINKEDIN  (float phase: 0s)
  ══════════════════════════════════════════════════════════ -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,-9;0,0" dur="3.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" begin="0s"/>

    <!-- Glow halo -->
    <rect x="10" y="40" width="194" height="178" rx="17" fill="#0073b1" filter="url(#halo)">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite" begin="0s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </rect>
    <!-- Animated border -->
    <rect x="10" y="40" width="194" height="178" rx="17" fill="none" stroke="#0A94D9" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.35;1;0.35" dur="3.5s" repeatCount="indefinite" begin="0s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <animate attributeName="stroke-width"   values="1.5;2.5;1.5" dur="3.5s" repeatCount="indefinite" begin="0s"/>
    </rect>
    <!-- Card face -->
    <rect x="12" y="42" width="190" height="174" rx="15" fill="url(#gl)" filter="url(#card-shadow)"/>
    <!-- Shine -->
    <rect x="12" y="42" width="190" height="52" rx="15" fill="white" opacity="0.09"/>
    <rect x="12" y="87" width="190" height="10"         fill="white" opacity="0.05"/>
    <!-- Icon badge -->
    <circle cx="107" cy="93" r="29" fill="rgba(0,0,0,0.3)"/>
    <text x="107" y="102" text-anchor="middle"
          fill="white" font-family="Arial,sans-serif"
          font-size="27" font-weight="900" letter-spacing="-2">in</text>
    <!-- Platform name -->
    <text x="107" y="137" text-anchor="middle"
          fill="white" font-family="'Segoe UI',Arial,sans-serif"
          font-size="14" font-weight="700">LinkedIn</text>
    <!-- Handle -->
    <rect x="47" y="145" width="120" height="18" rx="9" fill="rgba(0,0,0,0.25)"/>
    <text x="107" y="158" text-anchor="middle"
          fill="rgba(255,255,255,0.9)" font-family="'Segoe UI',Arial,sans-serif"
          font-size="9.5">sanchit-singh25</text>
    <!-- Tagline -->
    <text x="107" y="186" text-anchor="middle"
          fill="rgba(255,255,255,0.6)" font-family="'Segoe UI',Arial,sans-serif"
          font-size="8.5" font-style="italic">Let's grow together ↗</text>
    <!-- Bottom accent -->
    <line x1="72" y1="202" x2="142" y2="202" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ══════════════════════════════════════════════════════
       CARD 2 — INSTAGRAM  (float phase: -0.875s)
  ══════════════════════════════════════════════════════════ -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,-9;0,0" dur="3.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" begin="-0.875s"/>

    <!-- Glow halo -->
    <rect x="220" y="40" width="194" height="178" rx="17" fill="#e1306c" filter="url(#halo)">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite" begin="-0.875s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </rect>
    <!-- Animated border -->
    <rect x="220" y="40" width="194" height="178" rx="17" fill="none" stroke="#f77737" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.35;1;0.35" dur="3.5s" repeatCount="indefinite" begin="-0.875s"/>
      <animate attributeName="stroke-width"   values="1.5;2.5;1.5" dur="3.5s" repeatCount="indefinite" begin="-0.875s"/>
    </rect>
    <!-- Card face -->
    <rect x="222" y="42" width="190" height="174" rx="15" fill="url(#gi)" filter="url(#card-shadow)"/>
    <rect x="222" y="42" width="190" height="52" rx="15" fill="white" opacity="0.09"/>
    <rect x="222" y="87" width="190" height="10"         fill="white" opacity="0.05"/>
    <!-- Camera icon (geometric) -->
    <circle cx="317" cy="93" r="29" fill="rgba(0,0,0,0.3)"/>
    <!-- Outer ring -->
    <circle cx="317" cy="93" r="17" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Lens -->
    <circle cx="317" cy="93" r="7.5" fill="white"/>
    <!-- Flash dot -->
    <circle cx="329" cy="81" r="3.5" fill="white"/>
    <!-- Platform name -->
    <text x="317" y="137" text-anchor="middle"
          fill="white" font-family="'Segoe UI',Arial,sans-serif"
          font-size="14" font-weight="700">Instagram</text>
    <!-- Handle -->
    <rect x="257" y="145" width="120" height="18" rx="9" fill="rgba(0,0,0,0.25)"/>
    <text x="317" y="158" text-anchor="middle"
          fill="rgba(255,255,255,0.9)" font-family="'Segoe UI',Arial,sans-serif"
          font-size="9.5">@sanc.hit_25</text>
    <!-- Tagline -->
    <text x="317" y="186" text-anchor="middle"
          fill="rgba(255,255,255,0.6)" font-family="'Segoe UI',Arial,sans-serif"
          font-size="8.5" font-style="italic">Follow my journey ↗</text>
    <line x1="282" y1="202" x2="352" y2="202" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ══════════════════════════════════════════════════════
       CARD 3 — GMAIL  (float phase: -1.75s)
  ══════════════════════════════════════════════════════════ -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,-9;0,0" dur="3.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" begin="-1.75s"/>

    <!-- Glow halo -->
    <rect x="430" y="40" width="194" height="178" rx="17" fill="#e74c3c" filter="url(#halo)">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite" begin="-1.75s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </rect>
    <!-- Animated border -->
    <rect x="430" y="40" width="194" height="178" rx="17" fill="none" stroke="#ff6b6b" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.35;1;0.35" dur="3.5s" repeatCount="indefinite" begin="-1.75s"/>
      <animate attributeName="stroke-width"   values="1.5;2.5;1.5" dur="3.5s" repeatCount="indefinite" begin="-1.75s"/>
    </rect>
    <!-- Card face -->
    <rect x="432" y="42" width="190" height="174" rx="15" fill="url(#gm)" filter="url(#card-shadow)"/>
    <rect x="432" y="42" width="190" height="52" rx="15" fill="white" opacity="0.09"/>
    <rect x="432" y="87" width="190" height="10"         fill="white" opacity="0.05"/>
    <!-- Envelope icon -->
    <circle cx="527" cy="93" r="29" fill="rgba(0,0,0,0.3)"/>
    <!-- Envelope body -->
    <rect x="511" y="81" width="32" height="23" rx="3" fill="none" stroke="white" stroke-width="2.2"/>
    <!-- Envelope flap (M chevron) -->
    <polyline points="511,81 527,95 543,81" fill="none" stroke="white" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- Platform name -->
    <text x="527" y="137" text-anchor="middle"
          fill="white" font-family="'Segoe UI',Arial,sans-serif"
          font-size="14" font-weight="700">Gmail</text>
    <!-- Handle (split for fit) -->
    <rect x="457" y="145" width="140" height="18" rx="9" fill="rgba(0,0,0,0.25)"/>
    <text x="527" y="158" text-anchor="middle"
          fill="rgba(255,255,255,0.9)" font-family="'Segoe UI',Arial,sans-serif"
          font-size="8.5">sanchitsingh78034</text>
    <!-- Tagline -->
    <text x="527" y="186" text-anchor="middle"
          fill="rgba(255,255,255,0.6)" font-family="'Segoe UI',Arial,sans-serif"
          font-size="8.5" font-style="italic">Drop a message anytime ↗</text>
    <line x1="492" y1="202" x2="562" y2="202" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ══════════════════════════════════════════════════════
       CARD 4 — GITHUB  (float phase: -2.625s)
  ══════════════════════════════════════════════════════════ -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,-9;0,0" dur="3.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" begin="-2.625s"/>

    <!-- Glow halo -->
    <rect x="640" y="40" width="194" height="178" rx="17" fill="#8b5cf6" filter="url(#halo)">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite" begin="-2.625s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </rect>
    <!-- Animated border -->
    <rect x="640" y="40" width="194" height="178" rx="17" fill="none" stroke="#a78bfa" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.35;1;0.35" dur="3.5s" repeatCount="indefinite" begin="-2.625s"/>
      <animate attributeName="stroke-width"   values="1.5;2.5;1.5" dur="3.5s" repeatCount="indefinite" begin="-2.625s"/>
    </rect>
    <!-- Card face -->
    <rect x="642" y="42" width="190" height="174" rx="15" fill="url(#gg)" filter="url(#card-shadow)"/>
    <rect x="642" y="42" width="190" height="52" rx="15" fill="white" opacity="0.09"/>
    <rect x="642" y="87" width="190" height="10"         fill="white" opacity="0.05"/>
    <!-- Octocat icon (simplified geometric) -->
    <circle cx="737" cy="93" r="29" fill="rgba(255,255,255,0.1)"/>
    <!-- Head -->
    <circle cx="737" cy="90" r="15" fill="white"/>
    <!-- Ears -->
    <polygon points="726,79 723,70 732,76" fill="white"/>
    <polygon points="748,79 751,70 742,76" fill="white"/>
    <!-- Eyes -->
    <circle cx="731" cy="88" r="2.8" fill="#1a1a2e"/>
    <circle cx="743" cy="88" r="2.8" fill="#1a1a2e"/>
    <!-- Smile -->
    <path d="M 731,95 Q 737,100 743,95" fill="none" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Tentacles -->
    <path d="M 726,103 Q 720,112 726,118" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M 748,103 Q 754,112 748,118" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <!-- Platform name -->
    <text x="737" y="137" text-anchor="middle"
          fill="white" font-family="'Segoe UI',Arial,sans-serif"
          font-size="14" font-weight="700">GitHub</text>
    <!-- Handle -->
    <rect x="667" y="145" width="140" height="18" rx="9" fill="rgba(255,255,255,0.1)"/>
    <text x="737" y="158" text-anchor="middle"
          fill="rgba(255,255,255,0.9)" font-family="'Segoe UI',Arial,sans-serif"
          font-size="9">Sanchit-Singh-codes</text>
    <!-- Tagline -->
    <text x="737" y="186" text-anchor="middle"
          fill="rgba(255,255,255,0.6)" font-family="'Segoe UI',Arial,sans-serif"
          font-size="8.5" font-style="italic">Star my projects ⭐</text>
    <line x1="702" y1="202" x2="772" y2="202" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  </g>

</svg>
