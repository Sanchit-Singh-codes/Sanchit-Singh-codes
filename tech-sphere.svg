<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <!-- Orbit Paths: 3 planes for 3D illusion -->
    <!-- Orbit 1: horizontal ring -->
    <path id="o1" d="M 290,210 A 165,58 0 0,1 615,210 A 165,58 0 0,1 290,210"/>
    <!-- Orbit 2: 60° tilted ring (bottom-right = front, top-left = back) -->
    <path id="o2" d="M 532,349 A 165,58 60 0,1 368,71 A 165,58 60 0,1 532,349"/>
    <!-- Orbit 3: -60° tilted ring (top-right = back, bottom-left = front) -->
    <path id="o3" d="M 532,71 A 165,58 -60 0,1 368,349 A 165,58 -60 0,1 532,71"/>

    <!-- Sphere gradient -->
    <radialGradient id="sphere-grad" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#c0caf5"/>
      <stop offset="28%"  stop-color="#7aa2f7"/>
      <stop offset="60%"  stop-color="#3d59a1"/>
      <stop offset="100%" stop-color="#1a1b26"/>
    </radialGradient>

    <!-- Halo ambient glow -->
    <radialGradient id="halo-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7aa2f7" stop-opacity="0.28"/>
      <stop offset="60%"  stop-color="#7aa2f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for icons -->
    <filter id="icon-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Blur for background halo -->
    <filter id="halo-blur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <!-- Glow for sphere -->
    <filter id="sphere-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      @keyframes sphere-breathe {
        0%, 100% { opacity: 0.88; }
        50%       { opacity: 1.0;  }
      }
      @keyframes halo-pulse {
        0%, 100% { opacity: 0.45; }
        50%       { opacity: 0.95; }
      }
      @keyframes ring-spin {
        from { transform: rotate(0deg);   }
        to   { transform: rotate(360deg); }
      }
      @keyframes ring-spin-rev {
        from { transform: rotate(0deg);    }
        to   { transform: rotate(-360deg); }
      }
      .sphere-core   { animation: sphere-breathe 4s ease-in-out infinite; }
      .halo-circle   { animation: halo-pulse 4s ease-in-out infinite; }
      .ring1 {
        transform-box: fill-box;
        transform-origin: center;
        animation: ring-spin 25s linear infinite;
      }
      .ring2 {
        transform-box: fill-box;
        transform-origin: center;
        animation: ring-spin-rev 18s linear infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#0d1117" rx="14"/>

  <!-- Ambient halo -->
  <circle cx="450" cy="210" r="210" fill="url(#halo-grad)" class="halo-circle" filter="url(#halo-blur)"/>

  <!-- Decorative spinning accent rings -->
  <g transform="translate(450,210)">
    <ellipse class="ring1" rx="100" ry="100" fill="none" stroke="#7aa2f7" stroke-width="0.8" stroke-opacity="0.2" stroke-dasharray="12,28,4,28"/>
    <ellipse class="ring2" rx="115" ry="115" fill="none" stroke="#bb9af7" stroke-width="0.8" stroke-opacity="0.15" stroke-dasharray="8,22,3,22"/>
  </g>

  <!-- Orbit path rings (visual guide lines) -->
  <ellipse cx="450" cy="210" rx="165" ry="58" fill="none" stroke="#7aa2f7" stroke-opacity="0.18" stroke-width="1.2" stroke-dasharray="5,6"/>
  <ellipse cx="450" cy="210" rx="165" ry="58" fill="none" stroke="#bb9af7" stroke-opacity="0.18" stroke-width="1.2" stroke-dasharray="5,6" transform="rotate(60 450 210)"/>
  <ellipse cx="450" cy="210" rx="165" ry="58" fill="none" stroke="#9ece6a" stroke-opacity="0.18" stroke-width="1.2" stroke-dasharray="5,6" transform="rotate(-60 450 210)"/>

  <!-- ═══════════════════ CENTRAL SPHERE ═══════════════════ -->
  <circle cx="450" cy="210" r="82" fill="url(#sphere-grad)" class="sphere-core" filter="url(#sphere-glow)"/>
  <!-- Specular highlight -->
  <ellipse cx="427" cy="183" rx="24" ry="16" fill="white" opacity="0.24"/>
  <!-- Inner glow ring -->
  <circle cx="450" cy="210" r="78" fill="none" stroke="#7aa2f7" stroke-width="1" stroke-opacity="0.35"/>
  <!-- Text on sphere -->
  <text x="450" y="206" text-anchor="middle" fill="#c0caf5" font-family="'Courier New',Courier,monospace" font-size="15" font-weight="bold" letter-spacing="3">DEV</text>
  <text x="450" y="226" text-anchor="middle" fill="#7aa2f7" font-family="'Courier New',Courier,monospace" font-size="9" letter-spacing="2">MOBILE · APP</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ORBIT 1: Horizontal ring (dur=9s) -->
  <!-- Path direction: LEFT → TOP(back) → RIGHT → BOTTOM(front) → LEFT -->
  <!-- Opacity pattern:    0.7 → 0.3    → 0.7  → 1.0     → 0.7   -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Flutter  | begin=0s  → LEFT (neutral) -->
  <g opacity="0.7" filter="url(#icon-glow)">
    <animateMotion dur="9s" repeatCount="indefinite" rotate="none" begin="0s">
      <mpath href="#o1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0.7;0.3;0.7;1;0.7" keyTimes="0;0.25;0.5;0.75;1" dur="9s" repeatCount="indefinite" begin="0s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    <circle r="26" fill="#00B4AB" stroke="#5efff8" stroke-width="1.8"/>
    <text text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="8.5" font-weight="bold">Flutter</text>
  </g>

  <!-- Dart | begin=-2.25s → TOP/BACK (dim) -->
  <g opacity="0.3" filter="url(#icon-glow)">
    <animateMotion dur="9s" repeatCount="indefinite" rotate="none" begin="-2.25s">
      <mpath href="#o1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0.7;0.3;0.7;1;0.7" keyTimes="0;0.25;0.5;0.75;1" dur="9s" repeatCount="indefinite" begin="-2.25s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    <circle r="26" fill="#0175C2" stroke="#29b6f6" stroke-width="1.8"/>
    <text text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="8.5" font-weight="bold">Dart</text>
  </g>

  <!-- Kotlin | begin=-4.5s → RIGHT (neutral) -->
  <g opacity="0.7" filter="url(#icon-glow)">
    <animateMotion dur="9s" repeatCount="indefinite" rotate="none" begin="-4.5s">
      <mpath href="#o1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0.7;0.3;0.7;1;0.7" keyTimes="0;0.25;0.5;0.75;1" dur="9s" repeatCount="indefinite" begin="-4.5s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    <circle r="26" fill="#7F52FF" stroke="#c0a8ff" stroke-width="1.8"/>
    <text text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="8.5" font-weight="bold">Kotlin</text>
  </g>

  <!-- Java | begin=-6.75s → BOTTOM/FRONT (bright) -->
  <g opacity="1" filter="url(#icon-glow)">
    <animateMotion dur="9s" repeatCount="indefinite" rotate="none" begin="-6.75s">
      <mpath href="#o1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0.7;0.3;0.7;1;0.7" keyTimes="0;0.25;0.5;0.75;1" dur="9s" repeatCount="indefinite" begin="-6.75s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    <circle r="26" fill="#E76F00" stroke="#ffb74d" stroke-width="1.8"/>
    <text text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="8.5" font-weight="bold">Java</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ORBIT 2: 60° tilted ring (dur=12s)                        -->
  <!-- Path: BOTTOM-RIGHT(front) → TOP-LEFT(back) → repeat       -->
  <!-- Opacity: 1 → 0.7 → 0.3 → 0.7 → 1                        -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Android | begin=0s → FRONT (bottom-right) -->
  <g opacity="1" filter="url(#icon-glow)">
    <animateMotion dur="12s" repeatCount="indefinite" rotate="none" begin="0s">
      <mpath href="#o2"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;0.7;0.3;0.7;1" keyTimes="0;0.25;0.5;0.75;1" dur="12s" repeatCount="indefinite" begin="0s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    <circle r="26" fill="#3DDC84" stroke="#7fffc4" stroke-width="1.8"/>
    <text text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="8.5" font-weight="bold">Android</text>
  </g>

  <!-- Firebase | begin=-3s -->
  <g opacity="0.7" filter="url(#icon-glow)">
    <animateMotion dur="12s" repeatCount="indefinite" rotate="none" begin="-3s">
      <mpath href="#o2"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;0.7;0.3;0.7;1" keyTimes="0;0.25;0.5;0.75;1" dur="12s" repeatCount="indefinite" begin="-3s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    <circle r="26" fill="#FFA000" stroke="#ffe082" stroke-width="1.8"/>
    <text text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="7.5" font-weight="bold">Firebase</text>
  </g>

  <!-- Figma | begin=-6s → BACK (top-left) -->
  <g opacity="0.3" filter="url(#icon-glow)">
    <animateMotion dur="12s" repeatCount="indefinite" rotate="none" begin="-6s">
      <mpath href="#o2"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;0.7;0.3;0.7;1" keyTimes="0;0.25;0.5;0.75;1" dur="12s" repeatCount="indefinite" begin="-6s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    <circle r="26" fill="#A259FF" stroke="#d4b2ff" stroke-width="1.8"/>
    <text text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="8.5" font-weight="bold">Figma</text>
  </g>

  <!-- Git | begin=-9s -->
  <g opacity="0.7" filter="url(#icon-glow)">
    <animateMotion dur="12s" repeatCount="indefinite" rotate="none" begin="-9s">
      <mpath href="#o2"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;0.7;0.3;0.7;1" keyTimes="0;0.25;0.5;0.75;1" dur="12s" repeatCount="indefinite" begin="-9s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    <circle r="26" fill="#F05032" stroke="#ff9e85" stroke-width="1.8"/>
    <text text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="8.5" font-weight="bold">Git</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ORBIT 3: -60° tilted ring (dur=15s)                        -->
  <!-- Path: TOP-RIGHT(back) → BOTTOM-LEFT(front) → repeat        -->
  <!-- Opacity: 0.3 → 0.7 → 1 → 0.7 → 0.3                      -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- VS Code | begin=0s → BACK (top-right) -->
  <g opacity="0.3" filter="url(#icon-glow)">
    <animateMotion dur="15s" repeatCount="indefinite" rotate="none" begin="0s">
      <mpath href="#o3"/>
    </animateMotion>
    <animate attributeName="opacity" values="0.3;0.7;1;0.7;0.3" keyTimes="0;0.25;0.5;0.75;1" dur="15s" repeatCount="indefinite" begin="0s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    <circle r="26" fill="#007ACC" stroke="#5cc5ff" stroke-width="1.8"/>
    <text text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="7.5" font-weight="bold">VSCode</text>
  </g>

  <!-- Python | begin=-3.75s -->
  <g opacity="0.7" filter="url(#icon-glow)">
    <animateMotion dur="15s" repeatCount="indefinite" rotate="none" begin="-3.75s">
      <mpath href="#o3"/>
    </animateMotion>
    <animate attributeName="opacity" values="0.3;0.7;1;0.7;0.3" keyTimes="0;0.25;0.5;0.75;1" dur="15s" repeatCount="indefinite" begin="-3.75s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    <circle r="26" fill="#3776AB" stroke="#88c0ff" stroke-width="1.8"/>
    <text text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="8.5" font-weight="bold">Python</text>
  </g>

  <!-- Node.js | begin=-7.5s → FRONT (bottom-left) -->
  <g opacity="1" filter="url(#icon-glow)">
    <animateMotion dur="15s" repeatCount="indefinite" rotate="none" begin="-7.5s">
      <mpath href="#o3"/>
    </animateMotion>
    <animate attributeName="opacity" values="0.3;0.7;1;0.7;0.3" keyTimes="0;0.25;0.5;0.75;1" dur="15s" repeatCount="indefinite" begin="-7.5s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    <circle r="26" fill="#339933" stroke="#7fff7f" stroke-width="1.8"/>
    <text text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="7.5" font-weight="bold">Node.js</text>
  </g>

  <!-- Postman | begin=-11.25s -->
  <g opacity="0.7" filter="url(#icon-glow)">
    <animateMotion dur="15s" repeatCount="indefinite" rotate="none" begin="-11.25s">
      <mpath href="#o3"/>
    </animateMotion>
    <animate attributeName="opacity" values="0.3;0.7;1;0.7;0.3" keyTimes="0;0.25;0.5;0.75;1" dur="15s" repeatCount="indefinite" begin="-11.25s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    <circle r="26" fill="#FF6C37" stroke="#ffa07a" stroke-width="1.8"/>
    <text text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="7.5" font-weight="bold">Postman</text>
  </g>

</svg>
